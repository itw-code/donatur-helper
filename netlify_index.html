<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <title>Verifikasi Akses - Donatur Helper</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      :root {
        --primary: #007bff;
        --bg: #f8f9fa;
        --text: #333;
        --card: #fff;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
      }
      .card {
        background: var(--card);
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        text-align: center;
        max-width: 400px;
        width: 100%;
      }
      h2 {
        margin-top: 0;
        font-size: 20px;
        margin-bottom: 8px;
      }
      p {
        color: #666;
        font-size: 14px;
        margin-bottom: 24px;
      }
      .error {
        color: #dc3545;
        font-size: 13px;
        margin-top: 16px;
      }
      .loading {
        color: var(--primary);
        font-size: 14px;
        font-weight: 500;
        display: none;
        margin-top: 16px;
      }
      #btn-container {
        display: flex;
        justify-content: center;
        min-height: 40px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Pilih Akun Google</h2>
      <p>Pilih akun utama Anda untuk masuk ke aplikasi Donatur Helper. Verifikasi ini diperlukan untuk menghindari error akses ganda.</p>
      
      <div id="btn-container">
        <!-- Google Sign In Button will render here -->
      </div>
      
      <div id="loading" class="loading">Memverifikasi akses... mohon tunggu.</div>
      <div id="msg" class="error"></div>
    </div>

    <!-- Load Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
      // The GCP Client ID you created
      const CLIENT_ID = '1015640886159-5nin478ski5i3rvov6km0rhgn91h41p7.apps.googleusercontent.com';
      
      // Your Apps Script deployment URL
      const APP_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzt4dyTtpTZhAXYleHJ6bC0na7jAfJpJft_sIfN0nReNtC9751ltMGKE07zMqAr-9rQZA/exec';

      window.onload = function () {
        google.accounts.id.initialize({
          client_id: CLIENT_ID,
          callback: handleCredentialResponse,
          auto_select: false, // Force them to choose if they have multiple
          cancel_on_tap_outside: true
        });

        // Render the Google-styled button
        google.accounts.id.renderButton(
          document.getElementById('btn-container'),
          { theme: 'outline', size: 'large', text: 'continue_with', width: 250 }
        );
      };

      function handleCredentialResponse(response) {
        const msg = document.getElementById('msg');
        const loading = document.getElementById('loading');
        const btnContainer = document.getElementById('btn-container');
        
        msg.textContent = '';
        loading.style.display = 'block';
        btnContainer.style.display = 'none';

        // Post the JWT to your Apps Script doPost endpoint
        const form = new FormData();
        form.append('credential', response.credential);
        
        fetch(APP_SCRIPT_URL, {
          method: 'POST',
          body: form
        })
        .then(r => r.json())
        .then(data => {
          if (data.success) {
            // Append the authuser=0 and maintain the hash (e.g. #c=CampaignID)
            const hash = window.location.hash || '';
            const finalUrl = APP_SCRIPT_URL + '?authuser=' + data.authuser + hash;
            
            // Redirect smoothly to the real app
            window.location.href = finalUrl;
          } else {
            throw new Error(data.message || 'Verifikasi gagal.');
          }
        })
        .catch(err => {
          loading.style.display = 'none';
          btnContainer.style.display = 'flex';
          msg.textContent = 'Error: ' + err.message;
        });
      }
    </script>
  </body>
</html>
