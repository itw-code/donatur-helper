<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  <rect x="50" y="100" width="500" height="100" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" style="filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.05));"/>
  <text x="50%" y="50%" font-family="sans-serif" font-weight="bold" font-size="18" fill="#475569" text-anchor="middle" dominant-baseline="middle">Wireframe: halaman-login-utama</text>
</svg>
